name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Agent-DID
        uses: docker/build-push-action@v5
        with:
          context: ./repos/Agent-DID
          push: ${{ github.event_name != 'pull_request' }}
          tags: didoneworld/agent-did:latest,didoneworld/agent-did:${{ github.sha }}

      - name: Build and push VC services
        run: |
          echo "Building VC services..."
          # Note: Requires Dockerfiles in verifiable-credential repo

      - name: Build and push ID Wallet
        uses: docker/build-push-action@v5
        with:
          context: ./repos/idwallet
          push: ${{ github.event_name != 'pull_request' }}
          tags: didoneworld/idwallet:latest,didoneworld/idwallet:${{ github.sha }}