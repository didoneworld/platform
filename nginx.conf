events {
    worker_connections 1024;
}

http {
    upstream agent-did {
        server agent-did:8000;
    }

    upstream vc-issuer {
        server vc-issuer:8001;
    }

    upstream vc-verifier {
        server vc-verifier:8004;
    }

    upstream idwallet {
        server idwallet:3000;
    }

    server {
        listen 80;
        server_name _;

        # Agent-DID API
        location /v1/ {
            proxy_pass http://agent-did;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OIDC endpoints
        location /.well-known/openid-configuration {
            proxy_pass http://agent-did;
            proxy_set_header Host $host;
        }

        # SAML
        location /saml/ {
            proxy_pass http://agent-did;
            proxy_set_header Host $host;
        }

        # VC Issuer
        location /vc/ {
            proxy_pass http://vc-issuer;
            proxy_set_header Host $host;
        }

        # VC Verifier
        location /verify/ {
            proxy_pass http://vc-verifier;
            proxy_set_header Host $host;
        }

        # ID Wallet
        location / {
            proxy_pass http://idwallet;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}