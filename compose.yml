version: '3.8'

name: did-one-world-platform

services:
  did-registry:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    Healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  vc-issuer:
    build:
      context: ./api/credentials
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - did-registry
    environment:
      - PORT=8001
      - DID_REGISTRY_URL=http://did-registry:8000

  wallet:
    build:
      context: ./api
      dockerfile: wallet.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - vc-issuer
    environment:
      - PORT=3000
      - VC_VERIFIER_URL=http://vc-issuer:8001

  admin-ui:
    image: node:20-alpine
    working_dir: /app
    command: npx serve ui/out -l 3000
    ports:
      - "3001:3000"
    volumes:
      - ./ui/out:/app:ro

volumes:
  postgres-data:

networks:
  platform-network:
    driver: bridge
