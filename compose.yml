version: '3.8'

name: did-one-world-platform

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - EMAIL=${ACME_EMAIL:-admin@didone.world}
    networks:
      - platform-network

  did-registry:
    image: node:20-alpine
    working_dir: /app
    command: ["npx", "serve", "api", "-l", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app:ro
    environment:
      - PORT=8000
    networks:
      - platform-network

  vc-issuer:
    image: node:20-alpine
    working_dir: /app
    command: ["npx", "serve", "api/credentials", "-l", "8001"]
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    networks:
      - platform-network

  wallet:
    image: node:20-alpine
    working_dir: /app
    command: ["npx", "serve", "api", "-l", "3000"]
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - platform-network

  admin-ui:
    image: node:20-alpine
    working_dir: /app
    command: ["npx", "serve", "ui/out", "-l", "3001"]
    ports:
      - "3001:3000"
    volumes:
      - ./ui/out:/app:ro
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
