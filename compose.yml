name: did-one-world-platform

services:
  did-registry:
    build:
      context: .
      dockerfile: Dockerfile.registry
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  vc-issuer:
    build:
      context: .
      dockerfile: Dockerfile.vc
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  wallet:
    build:
      context: .
      dockerfile: Dockerfile.wallet
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  admin-ui:
    image: node:20-alpine
    working_dir: /app
    command: ["npx", "serve", "ui/out", "-l", "3001"]
    ports:
      - "3001:3000"
    volumes:
      - ./ui/out:/app
